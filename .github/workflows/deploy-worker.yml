name: Deploy Worker

# ──────────────────────────────────────────────────────────────────────────────
# Builds Dockerfile.worker, pushes to Artifact Registry, deploys to Cloud Run.
#
# Migrations are owned by the API workflow (deploy-api.yml). This workflow
# assumes the schema is already up-to-date — deploy the API first when a
# release contains migrations.
#
# Required GitHub repository secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT
#   GCP_PROJECT_ID
#
# Required GitHub repository variables:
#   GCP_REGION
#   ARTIFACT_REGISTRY_REPO
#   WORKER_SERVICE_NAME              e.g. finance-worker
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "Dockerfile.worker"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/worker:${{ github.sha }}

jobs:
  # ─── 1. Lint / typecheck / test ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test

  # ─── 2. Build & push the worker image ──────────────────────────────────────
  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # ─── 3. Deploy to Cloud Run ────────────────────────────────────────────────
  # The worker exposes a small Fastify health server on $PORT (see
  # src/workers/worker.main.ts) so it can be deployed as a Cloud Run *service*.
  # `min-instances=1` keeps BullMQ consumers + repeatable cron jobs alive.
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ vars.WORKER_SERVICE_NAME }} to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.WORKER_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --platform=managed
            --no-allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=512Mi
            --min-instances=1
            --max-instances=3
            --concurrency=1
            --timeout=3600s
          # Secrets (DATABASE_URL, REDIS_URL, ENCRYPTION_KEY, Plaid/Firebase)
          # are bound from Secret Manager — do not put them here.
          env_vars: |
            NODE_ENV=production
            LOG_LEVEL=info

      - name: Show service URL
        run: |
          gcloud run services describe ${{ vars.WORKER_SERVICE_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)'

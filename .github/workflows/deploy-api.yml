name: Deploy API

# ──────────────────────────────────────────────────────────────────────────────
# Builds Dockerfile.api, pushes the image to Artifact Registry, runs Prisma
# migrations against the production DB, then deploys to Cloud Run.
#
# Required GitHub repository secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   GCP_SERVICE_ACCOUNT             ci-deployer@<project>.iam.gserviceaccount.com
#   GCP_PROJECT_ID                  e.g. finance-coach-prod
#   DATABASE_URL                    Neon pooled connection string (used only by the migrate job)
#
# Required GitHub repository variables (Settings → Variables → Actions):
#   GCP_REGION                      e.g. us-central1
#   ARTIFACT_REGISTRY_REPO          e.g. finance
#   API_SERVICE_NAME                e.g. finance-api
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "Dockerfile.api"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/api:${{ github.sha }}

jobs:
  # ─── 1. Lint / typecheck / test ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test

  # ─── 2. Build & push the API image to Artifact Registry ────────────────────
  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ─── 3. Apply Prisma migrations (gates the deploy) ─────────────────────────
  migrate:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

  # ─── 4. Deploy to Cloud Run ────────────────────────────────────────────────
  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ vars.API_SERVICE_NAME }} to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.API_SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --platform=managed
            --allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --timeout=60s
          # Non-secret env vars. Secrets (DATABASE_URL, REDIS_URL, JWT keys,
          # ENCRYPTION_KEY, Plaid/Firebase) must be bound from Secret Manager
          # via `--set-secrets` or the service YAML — do not put them here.
          env_vars: |
            NODE_ENV=production
            LOG_LEVEL=info

      - name: Show service URL
        run: |
          gcloud run services describe ${{ vars.API_SERVICE_NAME }} \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.url)'
